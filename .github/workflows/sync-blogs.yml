name: Sync Daily Blog

on:
  workflow_dispatch:      # Allow manual trigger in the UI only

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Portfolio Repo
        uses: actions/checkout@v4

      - name: Get Current Date
        run: |
          echo "TODAY=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Verify Blog Data Token
        run: |
          if [ -z "${{ secrets.BLOG_TOKEN }}" ]; then
            echo "::error::BLOG_TOKEN is not set. Please add it to your repository secrets."
            exit 1
          fi

      - name: Clone Blog Data Repo
        run: |
          # Use manual clone with token for better reliability on private repos
          git clone https://x-access-token:${{ secrets.BLOG_TOKEN }}@github.com/vivekgwork-cmd/blog-data.git source

      - name: Check for today's blog
        id: check_file
        run: |
          # Look for any .md file starting with today's date in root or content/
          FILE=$(find source -maxdepth 2 -name "${{ env.TODAY }}-*.md" | head -n 1) || true
          if [ -n "$FILE" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "file_path=$FILE" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Copy & Sync
        if: steps.check_file.outputs.found == 'true'
        run: |
          mkdir -p src/blog-content
          cp "${{ steps.check_file.outputs.file_path }}" src/blog-content/
          
      - name: Commit & Push
        if: steps.check_file.outputs.found == 'true'
        run: |
          git config --global user.name "sync-bot"
          git config --global user.email "actions@github.com"
          git add src/blog-content
          # Only commit if there are actual changes
          git diff --staged --quiet || (git commit -m "Auto-sync blog: ${{ env.TODAY }}" && git push)
